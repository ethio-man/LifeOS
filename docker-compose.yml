version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos_secret
      POSTGRES_DB: lifeos
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
